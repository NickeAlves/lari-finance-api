services:
  postgres:
    image: postgres:17-alpine
    container_name: lari-finance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lari_finance}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: lari-finance-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lari_finance}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SERVER_PORT: ${SERVER_PORT}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
